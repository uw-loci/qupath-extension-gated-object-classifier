# Result notifications
notification.success.title=Gated classification complete
notification.success.message={0} objects classified, {1} changed. Open the Workflow tab to copy this operation as a script.
notification.warning.title=Gated classification
notification.error.title=Gated classification failed

# Tooltips
tooltip.classifier=Pick an object classifier saved in the current project.
tooltip.source.all=Classify every object the chosen classifier can process in this image.
tooltip.source.selected=Classify only the objects currently selected in the QuPath viewer.
tooltip.source.custom=Classify objects that match the class and/or measurement filters below.
tooltip.classFilter=Pick one or more classes. Only objects with these classes will be classified.
tooltip.classFilter.unclassified=Also include objects that do not yet have any class.
tooltip.measurement.enable=Restrict to objects whose measurement value passes a numeric test.
tooltip.measurement.combo=Pick a measurement (e.g. cell area, DAB intensity).
tooltip.measurement.op=How to compare the measurement value: less than, between, etc.
tooltip.measurement.value=Threshold value (or lower bound when "between" is selected).
tooltip.measurement.value2=Upper bound for the "between" comparison.
tooltip.preserve=Only set a class on objects that are currently unclassified. Already-classified objects keep their class.
tooltip.showSelection=Highlight the objects that would be classified in the QuPath viewer.
tooltip.documentation=Open the Gated Object Classifier README on GitHub.
tooltip.apply=Apply the classifier to the gated subset and record a workflow step.
