# Extension metadata
name=Gated Object Classifier
description=Apply a saved object classifier to a gated subset of objects, chosen by class, by measurement value, or from the current selection.

# Menu items
menu.apply=Apply Gated Classification...

# Dialog titles and labels
dialog.title=Gated Object Classifier
dialog.header=Pick a classifier, choose which objects to classify, then click Apply.

