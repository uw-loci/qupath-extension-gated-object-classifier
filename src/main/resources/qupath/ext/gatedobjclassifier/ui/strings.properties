# Warnings
warning.noImage=No image is currently open.
warning.noProject=A project must be open to load saved classifiers.
warning.noClassifiers=The current project has no saved object classifiers.
warning.noSelection=No objects are currently selected in the hierarchy.
warning.incompatibleClassifier=The selected classifier reports no compatible objects in this image.
warning.missingFeatures=Some objects are missing features expected by the classifier.
warning.missingFeatures.preview=Heads up: {0} object(s) are missing the feature "{1}"{2} this classifier expects. Results may be unreliable.
warning.imageChanged=Active image changed - closing the Gated Object Classifier dialog. Reopen it on the new image to apply.
